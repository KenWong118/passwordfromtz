name: Generate CBOM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Generate cbom16.json
        run: cdxgen --type java --include-crypto --evidence --deep --spec-version 1.6 --profile appsec -o cbom16.json

      - name: Commit updated cbom16.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cbom16.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update cbom16.json"
          git push

# Made with Bob
