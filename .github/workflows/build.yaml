# This workflow will build a Java project with Apache Ant and generate CBOM
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Build PasswordSafe with Ant

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ "published" ]
  workflow_dispatch:

jobs:
  cbom-scan:
    runs-on: ubuntu-latest
    name: Build and CBOM generation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Ant
        # When scanning Java code, the build should be completed beforehand
        run: ant build-all
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: "PasswordSafe-JAR"
          path: |
            dist/PasswordSafe.jar
            dist/PasswordSafe.jar.sha256.txt
          if-no-files-found: error
      - name: Create CBOM
        uses: cbomkit/cbomkit-action@v2.1.2
        id: cbom
        env:
          CBOMKIT_LANGUAGES: java
      - name: Upload CBOM artifacts
        # Allows persisting the CBOMs after job completion and
        # sharing them with another job in the same workflow.
        uses: actions/upload-artifact@v6
        with:
          name: "CBOM"
          path: ${{ steps.cbom.outputs.pattern }}
          if-no-files-found: warn
